<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FaceID</title>
<style>
:root{
  --bg:oklch(18% .012 80);--panel:oklch(22% .012 80);--line:oklch(32% .01 80);
  --fg:oklch(88% .01 90);--dim:oklch(62% .01 90);--acc:oklch(85% .25 130);
  --warn:oklch(75% .18 60);--bad:oklch(65% .2 25);
  --mono:ui-monospace,"SF Mono",Menlo,monospace;--sans:system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);color:var(--fg);font:14px/1.45 var(--sans)}
header{display:flex;align-items:baseline;gap:16px;padding:10px 16px;border-bottom:1px solid var(--line)}
header h1{font:700 15px var(--mono);color:var(--acc);letter-spacing:.08em}
header .stat{font:12px var(--mono);color:var(--dim)}
nav{display:flex;gap:0;border-bottom:1px solid var(--line)}
nav button{background:none;border:0;border-right:1px solid var(--line);color:var(--dim);
  font:13px var(--mono);padding:8px 18px;cursor:pointer}
nav button.on{color:var(--acc);background:var(--panel)}
main{padding:16px;max-width:1200px}
h2{font:600 12px var(--mono);color:var(--dim);text-transform:uppercase;letter-spacing:.12em;margin:18px 0 8px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:6px}
.tile{position:relative;border:1px solid var(--line);background:var(--panel)}
.tile img{width:100%;aspect-ratio:1;object-fit:cover;display:block;filter:saturate(.9)}
.tile .score{position:absolute;bottom:0;left:0;right:0;font:11px var(--mono);
  background:color-mix(in oklab,var(--bg) 80%,transparent);padding:1px 4px;color:var(--acc)}
.tile.sel{outline:2px solid var(--acc);outline-offset:-2px}
.tile button.x{position:absolute;top:0;right:0;background:var(--bg);border:0;color:var(--bad);
  font:12px var(--mono);padding:2px 6px;cursor:pointer;display:none}
.tile button.u{position:absolute;top:0;left:0;background:var(--bg);border:0;color:var(--warn);
  font:12px var(--mono);padding:2px 6px;cursor:pointer;display:none}
.tile:hover button.x,.tile:hover button.u{display:block}
.cluster{border:1px solid var(--line);padding:10px;margin-bottom:14px}
.cluster .head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.cluster .head b{font:600 13px var(--mono);color:var(--fg)}
.cluster .guess{font:12px var(--mono);color:var(--warn)}
.person{border:1px solid var(--line);padding:10px;margin-bottom:14px}
.person .head{display:flex;align-items:baseline;gap:12px;margin-bottom:8px}
.person .head b{font:600 14px var(--sans)}
.person .head .n{font:12px var(--mono);color:var(--dim)}
button.act{background:var(--acc);border:0;color:oklch(20% .02 130);font:600 12px var(--mono);
  padding:5px 12px;cursor:pointer}
button.ghost{background:none;border:1px solid var(--line);color:var(--dim);font:12px var(--mono);
  padding:4px 10px;cursor:pointer}
button.ghost:hover{color:var(--fg)}
input,select{background:var(--panel);border:1px solid var(--line);color:var(--fg);
  font:13px var(--mono);padding:5px 8px}
table{border-collapse:collapse;width:100%;font:13px var(--mono)}
td,th{border-bottom:1px solid var(--line);padding:6px 10px;text-align:left}
th{color:var(--dim);font-weight:400;font-size:11px;text-transform:uppercase;letter-spacing:.1em}
td.p{color:var(--acc)} td.u{color:var(--warn)}
.empty{color:var(--dim);font:13px var(--mono);padding:20px 0}
.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:10px 0}
#toast{position:fixed;bottom:16px;right:16px;background:var(--panel);border:1px solid var(--acc);
  color:var(--fg);font:12px var(--mono);padding:8px 14px;display:none}
.tile button.z{position:absolute;bottom:18px;right:0;background:var(--bg);border:0;color:var(--acc);
  font:12px var(--mono);padding:2px 6px;cursor:pointer;display:none}
.tile:hover button.z{display:block}
#lightbox{position:fixed;inset:0;background:color-mix(in oklab,var(--bg) 88%,transparent);
  display:none;align-items:center;justify-content:center;z-index:10;cursor:zoom-out;flex-direction:column;gap:8px}
#lightbox img{max-width:94vw;max-height:88vh;border:1px solid var(--acc)}
#lightbox .cap{font:12px var(--mono);color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1>FACEID</h1>
  <span class="stat" id="health">—</span>
</header>
<nav>
  <button data-t="unknowns" class="on">UNBEKANNT</button>
  <button data-t="persons">PERSONEN</button>
  <button data-t="recent">ERKENNUNGEN</button>
</nav>
<main id="main"></main>
<div id="toast"></div>
<div id="lightbox" onclick="this.style.display='none'"><img id="lbimg" src=""><span class="cap" id="lbcap"></span></div>

<script>
const $=s=>document.querySelector(s), main=$('#main');
let tab='unknowns', persons={}, selected=new Set();

async function j(url,opt){const r=await fetch(url,opt);if(!r.ok)throw new Error(await r.text());return r.json()}
function toast(m){const t=$('#toast');t.textContent=m;t.style.display='block';setTimeout(()=>t.style.display='none',2500)}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function fmtTs(ts){return new Date(ts*1000).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  tab=b.dataset.t;selected.clear();
  document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('on',x===b));
  render()});

async function health(){try{const h=await j('api/health');
  $('#health').textContent=`${h.persons} personen · queue ${h.queue} · events ${h.open_events}`}catch(e){$('#health').textContent='offline'}}

function personOptions(){return Object.entries(persons).map(([s,p])=>`<option value="${s}">${esc(p.name)}</option>`).join('')}

async function render(){
  persons=await j('api/persons');
  if(tab==='unknowns')return renderUnknowns();
  if(tab==='persons')return renderPersons();
  return renderRecent();
}

function backfillRow(bf){
  const status = bf.running
    ? `durchsuche Verlauf… ${bf.processed}/${bf.total||'?'} Events`
    : bf.result
      ? bf.result.error
        ? `Scan fehlgeschlagen: ${esc(bf.result.error)}`
        : `letzter Scan: ${bf.result.faces} neue Gesichter, ${bf.result.known} bereits bekannt, ${bf.result.no_face} ohne Gesicht`
      : 'holt Gesichter aus vergangenen Kamera-Aufnahmen in die Sichtung';
  return `<div class="row">
    <select id="bfdays" ${bf.running?'disabled':''}>
      <option value="7">letzte 7 Tage</option>
      <option value="14" selected>letzte 14 Tage</option>
      <option value="28">letzte 28 Tage</option>
    </select>
    <button class="act" onclick="startBackfill()" ${bf.running?'disabled':''}>
      ${bf.running?'SCAN LÄUFT…':'KAMERA-VERLAUF DURCHSUCHEN'}</button>
    <span class="stat">${status}</span>
  </div>`;
}
async function startBackfill(){
  try{
    await j('api/backfill',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({days:+$('#bfdays').value})});
    toast('Verlaufs-Scan gestartet');
  }catch(e){toast('Scan läuft bereits')}
  render();
}
async function renderUnknowns(){
  const [clusters,bf]=await Promise.all([j('api/unknowns'),j('api/backfill')]);
  if(bf.running&&tab==='unknowns')setTimeout(()=>{if(tab==='unknowns')render()},4000);
  if(!clusters.length){
    main.innerHTML=backfillRow(bf)+'<div class="empty">Keine unbekannten Gesichter in der Queue.</div>';return}
  main.innerHTML=backfillRow(bf)+`<div class="row">
    <button class="act" onclick="autoAssign()">VORSCHLÄGE ÜBERNEHMEN ≥50%</button>
    <span class="stat">ordnet alle Gesichter zu, deren bester Galerie-Match über der Erkennungsschwelle liegt</span>
  </div>`+clusters.map((c,i)=>`
    <div class="cluster" data-i="${i}">
      <div class="head">
        <b>CLUSTER ${String(i+1).padStart(2,'0')}</b>
        <span class="stat">${c.length} Aufnahme${c.length>1?'n':''} · ${esc(c[0].camera||'')}</span>
        ${c[0].guess?`<span class="guess">ähnlich: ${esc(c[0].guess)} (${(c[0].guess_score*100|0)}%)</span>`:''}
        <span style="flex:1"></span>
        <select id="sel${i}"><option value="">— Person wählen —</option>${personOptions()}</select>
        <input id="new${i}" placeholder="…oder neuer Name" size="14">
        <button class="act" onclick="assignCluster(${i})">ZUORDNEN</button>
        <button class="ghost" onclick="discardCluster(${i})">verwerfen</button>
      </div>
      <div class="grid">${c.map(u=>`
        <div class="tile" data-id="${u.id}" onclick="this.classList.toggle('sel')">
          <img src="data/unknowns/${u.id}.jpg" loading="lazy">
          <span class="score">${fmtTs(u.ts)}</span>
          ${u.full_url?`<button class="z" title="ganzer Snapshot" onclick="event.stopPropagation();showFull('${u.full_url}','${esc(u.camera||'')} · ${fmtTs(u.ts)}')">⛶</button>`:''}
        </div>`).join('')}
      </div>
    </div>`).join('');
  window._clusters=clusters;
}
async function assignCluster(i){
  const person=$(`#new${i}`).value.trim()||$(`#sel${i}`).value;
  if(!person)return toast('Person wählen oder Namen eingeben');
  const box=document.querySelector(`.cluster[data-i="${i}"]`);
  const sel=[...box.querySelectorAll('.tile.sel')].map(t=>t.dataset.id);
  const ids=sel.length?sel:window._clusters[i].map(u=>u.id);
  const r=await j('api/unknowns/assign',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ids,person})});
  toast(`${r.assigned} Gesicht(er) → ${person}`);render();
}
function showFull(url,cap){$('#lbimg').src=url;$('#lbcap').textContent=cap||'';
  $('#lightbox').style.display='flex'}
async function autoAssign(){
  const r=await j('api/unknowns/auto_assign',{method:'POST'});
  toast(r.total
    ?`${r.total} zugeordnet: ${Object.entries(r.assigned).map(([n,c])=>`${n} ×${c}`).join(', ')}`
    :'Keine sicheren Vorschläge (≥50%) in der Queue');
  render();
}
async function discardCluster(i){
  const box=document.querySelector(`.cluster[data-i="${i}"]`);
  const sel=[...box.querySelectorAll('.tile.sel')].map(t=>t.dataset.id);
  const ids=sel.length?sel:window._clusters[i].map(u=>u.id);
  await j('api/unknowns/discard',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ids,person:'-'})});
  toast(`${ids.length} verworfen`);render();
}

async function renderPersons(){
  const entries=Object.entries(persons);
  main.innerHTML=`
    <div class="row">
      <input id="pname" placeholder="Neue Person…" size="18">
      <button class="act" onclick="createPerson()">ANLEGEN</button>
    </div>`+
    (entries.length?entries.map(([slug,p])=>`
    <div class="person">
      <div class="head">
        <b>${esc(p.name)}</b><span class="n">${p.count} Gesichter</span>
        <span style="flex:1"></span>
        <label class="ghost" style="cursor:pointer">Fotos hochladen
          <input type="file" multiple accept="image/*" style="display:none" onchange="upload('${slug}',this)">
        </label>
        <button class="ghost" onclick="delPerson('${slug}','${esc(p.name)}')">löschen</button>
      </div>
      <div class="grid">${p.files.map(f=>`
        <div class="tile"><img src="data/persons/${slug}/${f}" loading="lazy" style="cursor:zoom-in"
            onclick="showFull('data/persons/${slug}/${f}','${esc(p.name)}')">
          <button class="u" title="zurück zu Unbekannt" onclick="unassignFace('${slug}','${f}')">↩</button>
          <button class="x" title="endgültig löschen" onclick="delFace('${slug}','${f}')">×</button></div>`).join('')}
      </div>
    </div>`).join(''):'<div class="empty">Noch keine Personen angelegt.</div>');
}
async function createPerson(){const n=$('#pname').value.trim();if(!n)return;
  await j('api/persons',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})});
  toast(`Person „${n}" angelegt`);render()}
async function upload(slug,inp){
  const fd=new FormData();[...inp.files].forEach(f=>fd.append('files',f));
  toast(`Verarbeite ${inp.files.length} Foto(s)…`);
  const r=await j(`api/persons/${slug}/photos`,{method:'POST',body:fd});
  toast(`${r.added} eingelernt${r.skipped.length?`, ${r.skipped.length} übersprungen`:''}`);render()}
async function delFace(slug,f){await j(`api/persons/${slug}/faces/${f}`,{method:'DELETE'});render()}
async function unassignFace(slug,f){await j(`api/persons/${slug}/faces/${f}/unassign`,{method:'POST'});
  toast('Gesicht zurück in die Unbekannt-Queue');render()}
async function delPerson(slug,name){if(!confirm(`Person „${name}" mit allen Gesichtern löschen?`))return;
  await j(`api/persons/${slug}`,{method:'DELETE'});render()}

async function renderRecent(){
  const rows=await j('api/recent');
  main.innerHTML=rows.length?`<table>
    <tr><th>Zeit</th><th>Kamera</th><th>Person</th><th>Score</th><th>Event</th></tr>
    ${rows.map(r=>`<tr><td>${fmtTs(r.ts)}</td><td>${esc(r.camera)}</td>
      <td class="${r.person==='unbekannt'?'u':'p'}">${esc(r.person)}</td>
      <td>${(r.score*100).toFixed(0)}%</td><td class="n">${esc(r.event_id)}</td></tr>`).join('')}
  </table>`:'<div class="empty">Noch keine Erkennungen seit dem Start.</div>';
}

health();setInterval(health,10000);render();
</script>
</body>
</html>
